<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🎨 你画我猜 · 全屏对战</title>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg: #0b0b1a;
            --surface: #12122a;
            --surface2: #1e1e42;
            --primary: #ff4d6d;
            --accent: #ffd166;
            --text: #f0f0f8;
            --text2: #a0a0c0;
            --success: #2ecc71;
            --danger: #e74c3c;
            --radius: 20px;
            --transition: 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            height: 100vh;
            height: -webkit-fill-available;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
        }

        .game-container {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            height: -webkit-fill-available;
            display: flex;
            flex-direction: column;
            background: var(--surface);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.6);
            position: relative;
        }

        /* 顶部状态栏 */
        .top-bar {
            padding: 10px 16px;
            background: var(--surface2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-shrink: 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            z-index: 10;
        }
        .room-info {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
        }
        .room-info .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            margin-right: 4px;
        }
        .btn-sm {
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
        }
        .btn-sm:active {
            background: var(--primary);
            border-color: var(--primary);
        }

        /* 画板全屏区域 */
        .canvas-container {
            flex: 1 1 auto;
            position: relative;
            background: #fff;
            margin: 0;
            border-bottom: 3px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            touch-action: none;
            cursor: crosshair;
            min-height: 0;
        }
        .canvas-container.active-draw {
            border-bottom-color: var(--accent);
            box-shadow: inset 0 0 20px rgba(255, 209, 102, 0.2);
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .canvas-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.2rem;
            font-weight: 800;
            color: rgba(0, 0, 0, 0.15);
            pointer-events: none;
            letter-spacing: 4px;
        }
        .word-hint {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.6);
            color: var(--accent);
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.8rem;
            letter-spacing: 2px;
        }

        /* 底部滑动区域 */
        .bottom-panel {
            flex-shrink: 0;
            max-height: 35vh;
            overflow-y: auto;
            background: var(--surface);
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            -webkit-overflow-scrolling: touch;
        }

        .score-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 4px;
        }
        .score-card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 14px;
            padding: 8px 16px;
            text-align: center;
            min-width: 70px;
            border: 2px solid transparent;
            transition: var(--transition);
        }
        .score-card.active-turn {
            border-color: var(--accent);
            box-shadow: 0 0 14px rgba(255, 209, 102, 0.4);
        }
        .score-card .name {
            font-size: 0.7rem;
            color: var(--text2);
        }
        .score-card .points {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--accent);
        }
        .role-badge {
            font-size: 0.6rem;
            padding: 2px 8px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            display: inline-block;
        }

        .answer-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .answer-row input {
            flex: 1;
            padding: 12px 14px;
            border-radius: 30px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            font-size: 0.95rem;
            font-family: inherit;
        }
        .answer-row input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .btn-submit {
            background: var(--primary);
            border: none;
            color: #fff;
            padding: 12px 18px;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.9rem;
            white-space: nowrap;
        }
        .btn-submit:active {
            transform: scale(0.95);
        }
        .btn-submit:disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        .chat-section {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 4px;
        }
        .chat-messages {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 8px;
            height: 90px;
            overflow-y: auto;
            font-size: 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .chat-msg {
            padding: 4px 8px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            word-break: break-word;
        }
        .chat-msg.system {
            text-align: center;
            color: var(--text2);
            font-style: italic;
            background: transparent;
        }
        .chat-msg.correct {
            background: rgba(46, 204, 113, 0.2);
            color: #7bed9f;
            font-weight: 700;
        }
        .chat-msg.wrong {
            background: rgba(231, 76, 60, 0.2);
            color: #ff7675;
        }
        .chat-input-row {
            display: flex;
            gap: 8px;
        }
        .chat-input-row input {
            flex: 1;
            padding: 10px 12px;
            border-radius: 25px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 0.85rem;
        }
        .btn-chat {
            background: var(--surface2);
            border: 2px solid rgba(255, 255, 255, 0.25);
            color: #fff;
            padding: 10px 16px;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
            white-space: nowrap;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(4px);
        }
        .modal {
            background: var(--surface);
            padding: 24px;
            border-radius: 24px;
            width: 90%;
            max-width: 360px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .modal input {
            padding: 12px;
            border-radius: 30px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            text-align: center;
            font-size: 1rem;
            letter-spacing: 4px;
            font-weight: 700;
        }
        .modal .btn-primary {
            background: var(--primary);
            border: none;
            padding: 12px;
            border-radius: 30px;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #222;
            color: #fff;
            padding: 10px 22px;
            border-radius: 30px;
            font-weight: 600;
            z-index: 200;
            animation: toastIn 0.3s ease;
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        .hidden {
            display: none !important;
        }

        .tools-mini {
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
            background: rgba(0, 0, 0, 0.4);
            padding: 6px;
            border-radius: 30px;
            backdrop-filter: blur(6px);
        }
        .tools-mini button,
        .tools-mini .color-dot {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid transparent;
            background: rgba(255, 255, 255, 0.15);
            cursor: pointer;
            color: #fff;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .tools-mini .active {
            border-color: var(--accent);
            background: rgba(255, 209, 102, 0.3);
        }
        .color-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.4);
            cursor: pointer;
        }
        .size-slider {
            -webkit-appearance: none;
            width: 50px;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
            outline: none;
        }
    </style>
</head>
<body>
    <div class="game-container" id="gameContainer">
        <!-- 顶部状态 -->
        <div class="top-bar">
            <div class="room-info" id="roomBadge"><span class="dot"></span> 房间:<strong id="roomCodeDisplay">----</strong></div>
            <button class="btn-sm" id="btnCopyInvite">📋 邀请</button>
            <button class="btn-sm" id="btnLeaveRoom">🚪 离开</button>
        </div>

        <!-- 全屏画板 -->
        <div class="canvas-container" id="canvasWrapper">
            <canvas id="drawCanvas"></canvas>
            <div class="canvas-overlay" id="canvasOverlay"></div>
            <div class="word-hint" id="wordHintDisplay"></div>
            <div class="tools-mini" id="toolsMini">
                <button data-tool="pen" class="active">✏️</button>
                <button data-tool="eraser">🧹</button>
                <button data-tool="clear">🗑️</button>
                <span class="color-dot active" data-color="#1a1a1a" style="background:#1a1a1a;"></span>
                <span class="color-dot" data-color="#e94560" style="background:#e94560;"></span>
                <span class="color-dot" data-color="#3b82f6" style="background:#3b82f6;"></span>
                <span class="color-dot" data-color="#10b981" style="background:#10b981;"></span>
                <input type="color" id="customColor" value="#1a1a1a" style="width:26px;height:26px;border-radius:50%;padding:0;border:2px solid rgba(255,255,255,0.4);background:transparent;">
                <input type="range" class="size-slider" id="brushSize" min="1" max="15" value="3">
            </div>
        </div>

        <!-- 底部滑动区 -->
        <div class="bottom-panel" id="bottomPanel">
            <div class="score-row" id="scoreboard">
                <div class="score-card" id="scoreCard1"><div class="name">👤 你</div><div class="points">0</div><div class="role-badge">准备</div></div>
                <div class="score-card" id="scoreCard2"><div class="name">👤 对手</div><div class="points">0</div><div class="role-badge">准备</div></div>
            </div>

            <div class="answer-row">
                <input type="text" id="guessInput" placeholder="✏️ 输入你的答案..." disabled maxlength="20">
                <button class="btn-submit" id="btnSubmitGuess" disabled>提交答案</button>
            </div>

            <div class="chat-section">
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-row">
                    <input type="text" id="chatInput" placeholder="💬 发送消息..." maxlength="50">
                    <button class="btn-chat" id="btnSendChat">发送</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 房间弹窗 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2>🎮 加入或创建房间</h2>
            <button class="btn-primary" id="btnCreateRoom">✨ 创建房间</button>
            <div style="display:flex;align-items:center;gap:8px;color:var(--text2);"><span style="flex:1;height:1px;background:rgba(255,255,255,0.1);"></span> 或 <span style="flex:1;height:1px;background:rgba(255,255,255,0.1);"></span></div>
            <input type="text" id="joinRoomInput" placeholder="输入房间号" maxlength="20">
            <button class="btn-primary" id="btnJoinRoom" style="background:var(--surface2);">🔗 加入房间</button>
        </div>
    </div>
    <div id="toastContainer"></div>

    <script>
    (function() {
        const $ = (s) => document.querySelector(s);
        const canvas = $('#drawCanvas');
        const ctx = canvas.getContext('2d');
        const canvasWrapper = $('#canvasWrapper');
        const canvasOverlay = $('#canvasOverlay');
        const wordHintDisplay = $('#wordHintDisplay');
        const guessInput = $('#guessInput');
        const btnSubmitGuess = $('#btnSubmitGuess');
        const chatInput = $('#chatInput');
        const btnSendChat = $('#btnSendChat');
        const chatMessages = $('#chatMessages');
        const roomCodeDisplay = $('#roomCodeDisplay');
        const toolsMini = $('#toolsMini');
        const brushSizeInput = $('#brushSize');
        const customColorInput = $('#customColor');
        const scoreCard1 = $('#scoreCard1');
        const scoreCard2 = $('#scoreCard2');
        const modalOverlay = $('#modalOverlay');

        const ICE_SERVERS = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
                { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' }
            ]
        };

        const WORD_BANK = [
            '猫','狗','兔子','老虎','熊猫','长颈鹿','企鹅','鳄鱼','蝴蝶','蜗牛','汉堡','披萨','冰淇淋','西瓜','蛋糕','饺子','面条','火锅','棒棒糖','雨伞','眼镜','手机','自行车','气球','钢琴','火箭','书包','台灯','剪刀','医生','警察','厨师','太阳','月亮','彩虹','闪电','雪花','火山','瀑布','游泳','跳舞','睡觉','跑步'
        ];

        const STATE = {
            roomCode: null, playerId: null, playerName: '你', opponentName: '对手',
            myScore: 0, opponentScore: 0, isDrawer: false, currentWord: '', wordHint: '',
            roundTime: 50, timeLeft: 50, timerInterval: null,
            gameActive: false, roundActive: false, totalRounds: 6, currentRound: 0,
            peer: null, conn: null,
            tool: 'pen', color: '#1a1a1a', brushSize: 3, isDrawing: false, lastX:0, lastY:0,
            drawActions: []
        };

        function getRandomWord() { return WORD_BANK[Math.floor(Math.random()*WORD_BANK.length)]; }
        function getWordHint(w) { return w.split('').map(()=>'_').join(' '); }

        function showToast(msg) {
            const el = document.createElement('div'); el.className='toast'; el.textContent=msg;
            document.body.appendChild(el); setTimeout(()=>el.remove(), 2200);
        }

        function addChatMsg(text, cls='', tag='') {
            const el = document.createElement('div'); el.className=`chat-msg ${cls}`;
            el.innerHTML = tag ? `<b>${tag}</b> ${text}` : text;
            chatMessages.appendChild(el); chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function resizeCanvas() {
            const rect = canvasWrapper.getBoundingClientRect();
            const dpr = Math.min(window.devicePixelRatio||1, 2);
            if(canvas.width !== rect.width*dpr || canvas.height !== rect.height*dpr) {
                canvas.width = rect.width*dpr; canvas.height = rect.height*dpr;
                ctx.setTransform(1,0,0,1,0,0); ctx.scale(dpr,dpr);
                ctx.lineCap='round'; ctx.lineJoin='round';
            }
        }
        function clearCanvas() { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle='#fff'; ctx.fillRect(0,0,canvas.width,canvas.height); }

        function setDrawStyle() {
            ctx.strokeStyle = STATE.tool==='eraser'?'#fff':STATE.color;
            ctx.lineWidth = STATE.tool==='eraser'?STATE.brushSize*3:STATE.brushSize;
            ctx.lineCap='round'; ctx.lineJoin='round';
        }

        function getPos(e) {
            const r = canvas.getBoundingClientRect();
            return { x:Math.max(0,Math.min(1,(e.clientX-r.left)/r.width)), y:Math.max(0,Math.min(1,(e.clientY-r.top)/r.height)) };
        }
        function getTouchPos(e) {
            const r = canvas.getBoundingClientRect();
            const t = e.touches[0];
            return { x:Math.max(0,Math.min(1,(t.clientX-r.left)/r.width)), y:Math.max(0,Math.min(1,(t.clientY-r.top)/r.height)) };
        }

        function drawLine(nx1,ny1,nx2,ny2,color,size,tool) {
            const r = canvas.getBoundingClientRect();
            const x1=nx1*r.width, y1=ny1*r.height, x2=nx2*r.width, y2=ny2*r.height;
            ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
            ctx.strokeStyle = tool==='eraser'?'#fff':color;
            ctx.lineWidth = tool==='eraser'?size*3:size;
            ctx.stroke();
        }
        function replayAction(a) { drawLine(a.nx1,a.ny1,a.nx2,a.ny2,a.color,a.size,a.tool); }

        function sendMsg(msg) { if(STATE.conn&&STATE.conn.open) STATE.conn.send(msg); }

        function broadcastDraw(action) { sendMsg({type:'draw_action', action}); }

        function setupHost(roomId) {
            STATE.peer = new Peer(roomId, { debug:1, config:ICE_SERVERS });
            STATE.peer.on('open', id => {
                STATE.roomCode = id; updateRoomUI();
                addChatMsg('🏠 房间已创建，等待好友…', 'system');
                showToast('房间号: '+id);
                STATE.peer.on('connection', conn => {
                    if(STATE.conn) return;
                    STATE.conn = conn; setupConn(conn);
                    STATE.opponentName = '对手'; updateScoreboard();
                    addChatMsg('🎉 好友已连接！', 'system');
                    const tryStart = () => { if(!STATE.gameActive) startGame(); };
                    if(conn.open) tryStart(); else conn.on('open', tryStart);
                });
            });
            STATE.peer.on('error', e => showToast('⚠️ '+e.message));
        }

        function setupGuest(hostId) {
            STATE.peer = new Peer({ debug:1, config:ICE_SERVERS });
            STATE.peer.on('open', () => {
                const conn = STATE.peer.connect(hostId, {reliable:true});
                STATE.conn = conn; setupConn(conn);
                STATE.roomCode = hostId; STATE.playerId='player2'; STATE.playerName='挑战者';
                updateRoomUI(); updateScoreboard();
                conn.on('open', () => {
                    addChatMsg('✅ 已连接，等待游戏开始', 'system');
                    sendMsg({type:'player_joined', playerName:STATE.playerName});
                });
            });
        }

        function setupConn(conn) {
            conn.on('data', msg => {
                if(msg.senderId===STATE.playerId) return;
                switch(msg.type) {
                    case 'draw_action': if(!STATE.isDrawer&&STATE.roundActive) replayAction(msg.action); break;
                    case 'clear_canvas': if(!STATE.isDrawer) clearCanvas(); break;
                    case 'player_joined': STATE.opponentName=msg.playerName; updateScoreboard(); break;
                    case 'game_start': handleGameStart(msg); break;
                    case 'round_start': handleRoundStart(msg); break;
                    case 'guess_result':
                        if(msg.correct) {
                            addChatMsg('✅ 猜对了！', 'correct');
                            showToast('猜对了！');
                            if(!STATE.isDrawer) {
                                STATE.myScore += Math.max(1, Math.floor(STATE.timeLeft/5));
                                updateScoreboard();
                            }
                            endRound(true);
                        } else {
                            addChatMsg('❌ 猜错了', 'wrong');
                            showToast('猜错了，再试试');
                        }
                        break;
                    case 'round_end': handleRoundEnd(msg); break;
                    case 'game_over': handleGameOver(msg); break;
                    case 'chat_message':
                        addChatMsg(msg.text, '', msg.sender);
                        break;
                    case 'request_snapshot': if(STATE.isDrawer) sendSnapshot(); break;
                    case 'canvas_snapshot':
                        if(!STATE.isDrawer&&msg.imageData) {
                            const img=new Image();
                            img.onload=()=>{ resizeCanvas(); ctx.drawImage(img,0,0,canvas.getBoundingClientRect().width,canvas.getBoundingClientRect().height); };
                            img.src=msg.imageData;
                        }
                        break;
                }
            });
            conn.on('close', ()=>{ addChatMsg('对手离开', 'system'); resetState(); });
        }

        function sendSnapshot() {
            resizeCanvas();
            sendMsg({type:'canvas_snapshot', imageData: canvas.toDataURL('image/png')});
        }

        function resetState() {
            clearInterval(STATE.timerInterval);
            STATE.gameActive=STATE.roundActive=false; STATE.isDrawer=false;
            STATE.currentWord=''; guessInput.disabled=btnSubmitGuess.disabled=true;
            canvasWrapper.classList.remove('active-draw');
            wordHintDisplay.textContent=''; canvasOverlay.textContent='';
            updateScoreboard(); clearCanvas();
        }

        function startGame() {
            STATE.gameActive=true; STATE.currentRound=0; STATE.myScore=STATE.opponentScore=0;
            updateScoreboard(); addChatMsg('🎮 游戏开始！共6轮','system');
            sendMsg({type:'game_start', totalRounds:6, p1:STATE.playerId==='player1'?STATE.playerName:'对手', p2:STATE.playerId==='player2'?STATE.playerName:'对手'});
            nextRound();
        }

        function handleGameStart(msg) {
            STATE.gameActive=true; STATE.currentRound=0; STATE.myScore=STATE.opponentScore=0;
            if(STATE.playerId==='player1') STATE.opponentName=msg.p2||'对手'; else STATE.opponentName=msg.p1||'对手';
            updateScoreboard(); addChatMsg('🎮 游戏开始！','system'); nextRound();
        }

        function nextRound() {
            STATE.currentRound++;
            if(STATE.currentRound>STATE.totalRounds) { endGame(); return; }
            const drawerIsP1 = STATE.currentRound%2===1;
            STATE.isDrawer = (drawerIsP1&&STATE.playerId==='player1') || (!drawerIsP1&&STATE.playerId==='player2');
            STATE.roundActive=true; STATE.timeLeft=STATE.roundTime; STATE.drawActions=[];
            clearCanvas(); canvasWrapper.classList.toggle('active-draw', STATE.isDrawer);
            guessInput.disabled = btnSubmitGuess.disabled = STATE.isDrawer;
            if(STATE.isDrawer) {
                STATE.currentWord=getRandomWord(); STATE.wordHint=getWordHint(STATE.currentWord);
                wordHintDisplay.textContent='🎯 '+STATE.currentWord;
                canvasOverlay.textContent='';
                addChatMsg('🎨 轮到你画画！词：'+STATE.currentWord,'system');
            } else {
                STATE.currentWord=''; STATE.wordHint='';
                wordHintDisplay.textContent='';
                canvasOverlay.textContent='👀 猜词中';
                guessInput.focus();
                addChatMsg('👀 对手正在画画，输入答案吧','system');
                setTimeout(()=>sendMsg({type:'request_snapshot'}), 300);
            }
            updateScoreboard(); startTimer();
            sendMsg({type:'round_start', round:STATE.currentRound, drawer:drawerIsP1?'player1':'player2', time:STATE.timeLeft});
        }

        function handleRoundStart(msg) {
            STATE.roundActive=true; STATE.timeLeft=msg.time; STATE.drawActions=[]; clearCanvas();
            const drawerP1 = msg.drawer==='player1';
            STATE.isDrawer = (drawerP1&&STATE.playerId==='player1')||(!drawerP1&&STATE.playerId==='player2');
            canvasWrapper.classList.toggle('active-draw', STATE.isDrawer);
            guessInput.disabled = btnSubmitGuess.disabled = STATE.isDrawer;
            if(STATE.isDrawer) {
                if(!STATE.currentWord) STATE.currentWord=getRandomWord();
                STATE.wordHint=getWordHint(STATE.currentWord);
                wordHintDisplay.textContent='🎯 '+STATE.currentWord;
                canvasOverlay.textContent='';
            } else {
                STATE.currentWord=''; wordHintDisplay.textContent='';
                canvasOverlay.textContent='👀 猜词中'; guessInput.focus();
                setTimeout(()=>sendMsg({type:'request_snapshot'}), 300);
            }
            updateScoreboard(); startTimer();
        }

        function startTimer() {
            clearInterval(STATE.timerInterval);
            STATE.timeLeft=STATE.roundTime;
            STATE.timerInterval = setInterval(()=>{
                STATE.timeLeft--;
                if(STATE.timeLeft<=0) { clearInterval(STATE.timerInterval); if(STATE.isDrawer) endRound(false); }
            },1000);
        }

        function endRound(wasCorrect) {
            clearInterval(STATE.timerInterval);
            STATE.roundActive=false; STATE.isDrawing=false;
            guessInput.disabled=btnSubmitGuess.disabled=true;
            canvasWrapper.classList.remove('active-draw');
            if(STATE.isDrawer&&!wasCorrect) addChatMsg('⏰ 时间到！答案是：'+STATE.currentWord,'system');
            sendMsg({type:'round_end', word:STATE.currentWord});
            setTimeout(()=>{ if(STATE.gameActive) nextRound(); }, 2200);
        }

        function handleRoundEnd(msg) {
            clearInterval(STATE.timerInterval); STATE.roundActive=false;
            guessInput.disabled=btnSubmitGuess.disabled=true;
            canvasWrapper.classList.remove('active-draw');
            if(!STATE.isDrawer) canvasOverlay.textContent=msg.word||'';
            setTimeout(()=>{ if(STATE.gameActive) nextRound(); }, 2200);
        }

        function submitGuess() {
            if(!STATE.roundActive||STATE.isDrawer) return;
            const g = guessInput.value.trim(); if(!g) return;
            guessInput.value = '';
            // 发送给画家判断
            sendMsg({type:'guess_check', guess:g, sender:STATE.playerName});
            guessInput.focus();
        }

        function handleGuessCheck(msg) {
            if(!STATE.isDrawer||!STATE.roundActive) return;
            const correct = msg.guess === STATE.currentWord;
            sendMsg({type:'guess_result', correct, sender:STATE.playerName});
            if(correct) {
                STATE.opponentScore += Math.max(1, Math.floor(STATE.timeLeft/5));
                updateScoreboard();
                addChatMsg('🎉 对手猜对了！','correct');
                endRound(true);
            } else {
                addChatMsg(`💬 ${msg.sender}: "${msg.guess}"`, 'wrong');
            }
        }

        function endGame() {
            STATE.gameActive=false; clearInterval(STATE.timerInterval);
            guessInput.disabled=btnSubmitGuess.disabled=true;
            canvasWrapper.classList.remove('active-draw');
            const r = STATE.myScore>STATE.opponentScore?'🏆 你赢了！':(STATE.myScore<STATE.opponentScore?'😢 对手赢了！':'🤝 平局');
            addChatMsg(r+' 比分 '+STATE.myScore+':'+STATE.opponentScore,'system');
            sendMsg({type:'game_over'});
            setTimeout(()=>{ STATE.myScore=STATE.opponentScore=0; updateScoreboard(); },3000);
        }

        function handleGameOver(msg) {
            STATE.gameActive=false; clearInterval(STATE.timerInterval);
            guessInput.disabled=btnSubmitGuess.disabled=true;
            canvasWrapper.classList.remove('active-draw');
        }

        function updateScoreboard() {
            scoreCard1.querySelector('.points').textContent=STATE.myScore;
            scoreCard2.querySelector('.points').textContent=STATE.opponentScore;
            scoreCard1.querySelector('.name').textContent='👤 '+(STATE.playerName||'你');
            scoreCard2.querySelector('.name').textContent='👤 '+(STATE.opponentName||'对手');
            const r1=scoreCard1.querySelector('.role-badge'), r2=scoreCard2.querySelector('.role-badge');
            if(STATE.roundActive) {
                if(STATE.isDrawer) { r1.textContent='🎨 画家'; r2.textContent='🔍 猜词'; }
                else { r1.textContent='🔍 猜词'; r2.textContent='🎨 画家'; }
            } else { r1.textContent='准备'; r2.textContent='准备'; }
            scoreCard1.classList.toggle('active-turn', STATE.isDrawer&&STATE.roundActive);
            scoreCard2.classList.toggle('active-turn', !STATE.isDrawer&&STATE.roundActive&&STATE.gameActive);
        }

        function updateRoomUI() {
            roomCodeDisplay.textContent = STATE.roomCode||'----';
        }

        // 事件绑定
        canvas.addEventListener('mousedown', e=>{
            if(!STATE.isDrawer||!STATE.roundActive) return;
            STATE.isDrawing=true; const p=getPos(e); STATE.lastX=p.x; STATE.lastY=p.y;
            const a={nx1:p.x,ny1:p.y,nx2:p.x+0.0005,ny2:p.y+0.0005,color:STATE.color,size:STATE.brushSize,tool:STATE.tool};
            STATE.drawActions.push(a); drawLine(a.nx1,a.ny1,a.nx2,a.ny2,a.color,a.size,a.tool); broadcastDraw(a);
        });
        canvas.addEventListener('mousemove', e=>{
            if(!STATE.isDrawing) return;
            const p=getPos(e); const a={nx1:STATE.lastX,ny1:STATE.lastY,nx2:p.x,ny2:p.y,color:STATE.color,size:STATE.brushSize,tool:STATE.tool};
            STATE.drawActions.push(a); drawLine(a.nx1,a.ny1,a.nx2,a.ny2,a.color,a.size,a.tool); broadcastDraw(a);
            STATE.lastX=p.x; STATE.lastY=p.y;
        });
        canvas.addEventListener('mouseup', ()=>STATE.isDrawing=false);
        canvas.addEventListener('touchstart', e=>{
            if(!STATE.isDrawer||!STATE.roundActive||e.touches.length!==1) return;
            e.preventDefault(); STATE.isDrawing=true; const p=getTouchPos(e); STATE.lastX=p.x; STATE.lastY=p.y;
            const a={nx1:p.x,ny1:p.y,nx2:p.x+0.0005,ny2:p.y+0.0005,color:STATE.color,size:STATE.brushSize,tool:STATE.tool};
            STATE.drawActions.push(a); drawLine(a.nx1,a.ny1,a.nx2,a.ny2,a.color,a.size,a.tool); broadcastDraw(a);
        },{passive:false});
        canvas.addEventListener('touchmove', e=>{
            if(!STATE.isDrawing||e.touches.length!==1) return;
            e.preventDefault(); const p=getTouchPos(e); const a={nx1:STATE.lastX,ny1:STATE.lastY,nx2:p.x,ny2:p.y,color:STATE.color,size:STATE.brushSize,tool:STATE.tool};
            STATE.drawActions.push(a); drawLine(a.nx1,a.ny1,a.nx2,a.ny2,a.color,a.size,a.tool); broadcastDraw(a);
            STATE.lastX=p.x; STATE.lastY=p.y;
        },{passive:false});
        canvas.addEventListener('touchend', ()=>STATE.isDrawing=false);

        toolsMini.addEventListener('click', e=>{
            const btn = e.target.closest('button'); const dot = e.target.closest('.color-dot');
            if(btn) {
                const tool = btn.dataset.tool;
                if(tool==='clear') { clearCanvas(); STATE.drawActions=[]; sendMsg({type:'clear_canvas'}); }
                else { STATE.tool=tool; toolsMini.querySelectorAll('button').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); setDrawStyle(); }
            }
            if(dot) {
                STATE.color=dot.dataset.color; STATE.tool='pen';
                toolsMini.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
                toolsMini.querySelector('[data-tool="pen"]').classList.add('active');
                toolsMini.querySelectorAll('.color-dot').forEach(d=>d.classList.remove('active')); dot.classList.add('active');
                customColorInput.value=STATE.color; setDrawStyle();
            }
        });
        customColorInput.addEventListener('input', ()=>{
            STATE.color=customColorInput.value; STATE.tool='pen';
            toolsMini.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
            toolsMini.querySelector('[data-tool="pen"]').classList.add('active');
            setDrawStyle();
        });
        brushSizeInput.addEventListener('input', ()=>{ STATE.brushSize=parseInt(brushSizeInput.value); setDrawStyle(); });

        btnSubmitGuess.addEventListener('click', submitGuess);
        guessInput.addEventListener('keydown', e=>{ if(e.key==='Enter') submitGuess(); });
        btnSendChat.addEventListener('click', ()=>{
            const txt = chatInput.value.trim(); if(!txt) return;
            addChatMsg(txt, '', STATE.playerName);
            sendMsg({type:'chat_message', text:txt, sender:STATE.playerName});
            chatInput.value = '';
        });
        chatInput.addEventListener('keydown', e=>{ if(e.key==='Enter') { btnSendChat.click(); } });

        $('#btnCreateRoom').addEventListener('click', ()=>{
            const id = 'dg'+Math.random().toString(36).substring(2,8).toUpperCase();
            STATE.playerId='player1'; STATE.playerName='房主'; setupHost(id);
            modalOverlay.classList.add('hidden');
        });
        $('#btnJoinRoom').addEventListener('click', ()=>{
            const code = $('#joinRoomInput').value.trim();
            if(!code) return;
            STATE.playerId='player2'; STATE.playerName='挑战者'; setupGuest(code);
            modalOverlay.classList.add('hidden');
        });
        $('#btnLeaveRoom').addEventListener('click', ()=>{
            if(STATE.conn) STATE.conn.close();
            if(STATE.peer) STATE.peer.destroy();
            resetState(); modalOverlay.classList.remove('hidden');
        });
        $('#btnCopyInvite').addEventListener('click', ()=>{
            const link = location.origin+location.pathname+'?room='+STATE.roomCode;
            navigator.clipboard?.writeText(`🎨 你画我猜 房间号：${STATE.roomCode}\n${link}`).then(()=>showToast('已复制邀请'));
        });
        $('#roomBadge').addEventListener('click', ()=> $('#btnCopyInvite').click());

        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('beforeunload', ()=>{ if(STATE.conn) STATE.conn.close(); if(STATE.peer) STATE.peer.destroy(); });

        // 消息处理扩展
        const origHandle = setupConn;
        // 重新绑定消息处理，增加 guess_check 类型
        const originalOnData = (conn) => {
            conn.on('data', msg => {
                if(msg.senderId===STATE.playerId) return;
                if(msg.type==='guess_check') handleGuessCheck(msg);
                // 其他消息已在上面 setupConn 中处理，为防重复，此处跳过
            });
        };
        // 修改 setupConn 以整合新的消息处理
        const oldSetupConn = setupConn;
        setupConn = function(conn) {
            oldSetupConn(conn);
            conn.on('data', msg => {
                if(msg.type==='guess_check') handleGuessCheck(msg);
            });
        };

        function init() {
            resizeCanvas(); clearCanvas(); setDrawStyle();
            modalOverlay.classList.remove('hidden');
            const p = new URLSearchParams(location.search).get('room');
            if(p) { $('#joinRoomInput').value=p; setTimeout(()=>$('#btnJoinRoom').click(), 500); }
        }
        init();
    })();
    </script>
</body>
</html>
